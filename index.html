<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم بيانات حي القائم الأول</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a2a4d;
            --accent: #3b82f6;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
            --bg-gradient: linear-gradient(180deg, #dce9f4 0%, #b8c6e9 100%);
        }

        body {
            font-family: 'Cairo', sans-serif;
            margin: 0; padding: 0;
            display: flex; justify-content: center;
            min-height: 100vh;
            background: var(--bg-gradient);
            background-attachment: fixed;
            position: relative; overflow-x: hidden;
        }

        body::before {
            content: ""; position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image:
                linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 30px 30px; z-index: -1;
        }

        .app-container { width: 100%; max-width: 500px; padding: 30px 15px; text-align: center; }

        .header-title {
            color: var(--primary); font-size: 22px; font-weight: 900;
            margin-bottom: 25px; line-height: 1.4;
        }

        #statusBox {
            font-size: 13px; font-weight: bold; padding: 10px;
            border-radius: 12px; margin-bottom: 20px;
            background: rgba(255,255,255,0.5); display: inline-block; width: 100%;
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px; padding: 15px 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            display: flex; flex-direction: column; align-items: center;
            border-bottom: 5px solid transparent; transition: 0.3s;
        }

        .stat-card .number { font-size: 26px; font-weight: 900; color: var(--primary); }
        .stat-card .label { font-size: 11px; color: #5d6d8a; font-weight: 700; }

        .card-total { border-bottom-color: var(--accent); }
        .card-owned { border-bottom-color: var(--success); }
        .card-random { border-bottom-color: var(--error); }
        .card-rent { border-bottom-color: var(--warning); }

        .search-container {
            background: white; border: 2px solid #fff;
            border-radius: 50px; padding: 12px 20px;
            display: flex; align-items: center; box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .search-container input {
            background: transparent; border: none; outline: none;
            width: 100%; font-family: 'Cairo'; font-size: 16px;
            color: var(--primary); text-align: center;
        }

        .result-item {
            background: white; border-radius: 18px; padding: 15px;
            margin-bottom: 12px; text-align: right;
            border-right: 6px solid var(--primary);
            box-shadow: 0 4px 10px rgba(0,0,0,0.04);
            cursor: pointer; animation: fadeIn 0.4s ease;
        }

        .result-item strong { color: var(--primary); font-size: 16px; }
        .details { font-size: 13px; color: #555; margin-top: 6px; line-height: 1.6; }

        .member-tag {
            display: inline-block; background: #eee; padding: 2px 8px;
            border-radius: 5px; font-size: 11px; margin-top: 5px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .loader {
            border: 3px solid #f3f3f3; border-top: 3px solid var(--accent);
            border-radius: 50%; width: 16px; height: 16px;
            animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-left: 8px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* نافذة التفاصيل — بطاقة احترافية قابلة للطباعة */
        #detailOverlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15,23,42,0.7); backdrop-filter: blur(6px); z-index: 3000;
            overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch;
        }
        #detailModal {
            max-width: 560px; margin: 20px auto 40px; background: #fff;
            border-radius: 20px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            overflow: hidden; text-align: right;
        }
        .detail-actions {
            padding: 14px 20px; background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            border-bottom: 1px solid #e2e8f0;
            display: flex; gap: 12px; flex-wrap: wrap;
        }
        .detail-actions .btn-print {
            background: linear-gradient(135deg, var(--primary) 0%, #1e293b 100%);
            color: white; border: none; padding: 12px 22px;
            border-radius: 12px; font-family: 'Cairo'; font-weight: 800; cursor: pointer; font-size: 15px;
            box-shadow: 0 4px 14px rgba(26,42,108,0.35);
        }
        .detail-actions .btn-close {
            background: #64748b; color: white; border: none; padding: 12px 22px;
            border-radius: 12px; font-family: 'Cairo'; font-weight: 700; cursor: pointer; font-size: 15px;
        }
        .form-print-area { padding: 0 0 24px; }

        .card-photo-top {
            width: 100%; min-height: 160px; background: linear-gradient(145deg, var(--primary) 0%, #1e3a5f 100%);
            display: flex; align-items: center; justify-content: center;
            padding: 24px;
        }
        .card-photo-frame {
            width: 130px; height: 155px; border: 4px solid rgba(255,255,255,0.9);
            border-radius: 16px; background: rgba(255,255,255,0.15);
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.95);
            text-align: center; line-height: 1.5;
        }
        .card-main-title {
            text-align: center; font-size: 1.1rem; font-weight: 900; color: var(--primary);
            margin: 0; padding: 18px 20px 12px; border-bottom: 3px solid var(--accent);
        }
        .card-head-name {
            text-align: center; font-size: 1.25rem; font-weight: 900; color: #0f172a;
            padding: 14px 20px 20px; margin: 0; line-height: 1.4;
        }
        .card-section {
            margin: 0 20px 20px; border-radius: 14px; overflow: hidden;
            border: 1px solid #e2e8f0; box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .card-section-title {
            padding: 12px 16px; font-size: 0.95rem; font-weight: 800; color: #fff;
            display: flex; align-items: center; gap: 8px;
        }
        .card-section-title.sec-head { background: linear-gradient(135deg, #1e3a5f 0%, var(--primary) 100%); }
        .card-section-title.sec-home { background: linear-gradient(135deg, #065f46 0%, #047857 100%); }
        .card-section-title.sec-family { background: linear-gradient(135deg, #92400e 0%, #b45309 100%); }
        .card-section-title.sec-notes { background: linear-gradient(135deg, #475569 0%, #64748b 100%); }
        .card-section-body { padding: 14px 16px; background: #fafbfc; }
        .card-row {
            display: flex; justify-content: space-between; align-items: baseline;
            padding: 10px 0; border-bottom: 1px solid #e2e8f0; font-size: 14px; gap: 12px;
        }
        .card-row:last-child { border-bottom: none; }
        .card-row .lbl { color: #64748b; font-weight: 700; flex-shrink: 0; }
        .card-row .val { color: #0f172a; font-weight: 800; text-align: left; word-break: break-word; }
        .card-two-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 0 20px; }
        @media (max-width: 480px) { .card-two-cols { grid-template-columns: 1fr; } }
        .card-col .card-row { padding: 8px 0; }

        .form-table-wrap {
            overflow-x: auto; margin: 0; border: none; border-radius: 0;
            -webkit-overflow-scrolling: touch;
        }
        .form-table {
            width: 100%; border-collapse: collapse; font-size: 13px;
        }
        .form-table th, .form-table td {
            border: 1px solid #e2e8f0; padding: 10px 12px; text-align: right;
        }
        .form-table th {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            color: var(--primary); font-weight: 800; font-size: 12px;
        }
        .form-table td { font-weight: 700; color: #334155; }
        .form-table .col-num { width: 38px; text-align: center; }
        .form-table-family { font-size: 12px; }
        .form-table-family th, .form-table-family td { padding: 8px 10px; white-space: nowrap; }
        .form-table-family td:nth-child(2) { white-space: normal; min-width: 100px; }
        .form-notes .box {
            min-height: 56px; border: 2px dashed #cbd5e1; border-radius: 10px;
            padding: 12px; background: #f8fafc; margin-top: 6px;
        }
        .form-notes .lbl { font-size: 12px; color: #64748b; font-weight: 700; margin-bottom: 6px; display: block; }

        @media print {
            body * { visibility: hidden; }
            #detailOverlay, #detailOverlay * { visibility: visible; }
            #detailOverlay { position: absolute; left: 0; top: 0; right: 0; width: 100%; min-height: 100%; background: #fff; padding: 0; backdrop-filter: none; }
            .detail-actions { display: none !important; }
            #detailModal { max-width: 100%; box-shadow: none; margin: 0; border: none; }
            .form-print-area { padding-bottom: 20px; }
            .card-photo-top { min-height: 140px; }
            .card-section { box-shadow: none; }
            .form-table th, .form-table td { border-color: #334155; }
        }
    </style>
</head>
<body>

<div id="detailOverlay" onclick="if(event.target===this) closeDetail()">
    <div id="detailModal">
        <div class="detail-actions no-print">
            <button type="button" class="btn-print" onclick="window.print()">🖨️ طباعة</button>
            <button type="button" class="btn-close" onclick="closeDetail()">إغلاق</button>
        </div>
        <div class="form-print-area" id="detailBody"></div>
    </div>
</div>

<div class="app-container">
    <div class="header-title">لوحة تحكم بيانات <br> حي القائم الأول</div>

    <div id="statusBox">
        <span id="loaderIcon" class="loader"></span>
        <span id="statusText">جاري الاتصال بقاعدة البيانات...</span>
    </div>

    <div class="stats-grid">
        <div class="stat-card card-total">
            <div class="number" id="count-total">0</div>
            <div class="label">إجمالي العوائل</div>
        </div>
        <div class="stat-card card-owned">
            <div class="number" id="count-ملك">0</div>
            <div class="label">سكن ملك</div>
        </div>
        <div class="stat-card card-random">
            <div class="number" id="count-عشوائيات">0</div>
            <div class="label">عشوائيات</div>
        </div>
        <div class="stat-card card-rent">
            <div class="number" id="count-إيجار">0</div>
            <div class="label">سكن إيجار</div>
        </div>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" oninput="liveSearch()" placeholder="ابحث بالاسم، الهاتف، أو أفراد العائلة...">
    </div>

    <div id="resultsArea"></div>
</div>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbzIkbcB9mzpCP2dMO2P5UN5WE1Zo3TrZ5xd6wYAZejfVQcRwiQTqc9W2oiNmJFR_I9s2g/exec";
    const SECRET_TOKEN = "AL_QAIM_MUKHTAR_2026";
    let database = [];

    function init() {
        var statusText = document.getElementById('statusText');
        var loaderIcon = document.getElementById('loaderIcon');

        window.__dashboardData = function(result) {
            loaderIcon.style.display = "none";
            if (result && result.data) {
                var raw = result.data.map(function(row) {
                    return {
                        serialId: row[0],
                        date: row[1],
                        name: row[2],
                        nationalId: row[3],
                        cardId: row[4],
                        birth: row[5],
                        education: row[6],
                        job: row[7],
                        workLocation: row[8],
                        phone: row[9],
                        homeType: row[10],
                        address: row[11],
                        prevAddress: row[12],
                        moveDate: row[13],
                        taboo: row[14],
                        homeNum: row[15],
                        familyMembers: row[16]
                    };
                });
                database = raw.filter(function(item) {
                    var addr = String(item.address || "").replace(/\s+/g, " ").trim();
                    var name = String(item.name || "").replace(/\s+/g, " ").trim();
                    var serial = String(item.serialId || "").trim();
                    if (!name && !serial) return false;
                    if (name === "العنوان" || name === "الاسم" || name === "اسم رب الاسرة" || name === "اسم رب الأسرة" || name === "الاسم الرباعي واللقب") return false;
                    if (addr === "العنوان" || addr === "العنوان الحالي") return false;
                    if (addr.length <= 20 && addr.indexOf("العنوان") === 0) return false;
                    if (serial === "serialId" || (serial.indexOf("رقم") === 0 && serial.length < 25)) return false;
                    return true;
                });
                statusText.innerText = "متصل - تم تحديث البيانات";
                statusText.style.color = "green";
                updateStats();
            } else {
                statusText.innerText = "خطأ: لا توجد بيانات في الرد (تأكد من النشر وتحديثه).";
                statusText.style.color = "red";
            }
        };

        window.__dashboardError = function() {
            loaderIcon.style.display = "none";
            statusText.innerText = "خطأ: فشل الاتصال. تحقق من الرابط والنشر (New Deployment) والتوكن.";
            statusText.style.color = "red";
        };

        var url = scriptURL + "?token=" + encodeURIComponent(SECRET_TOKEN) + "&getAllData=true&callback=__dashboardData";
        var script = document.createElement("script");
        script.src = url;
        script.onerror = window.__dashboardError;
        document.head.appendChild(script);
    }

    function updateStats() {
        var stats = { total: database.length, ملك: 0, إيجار: 0, عشوائيات: 0 };
        database.forEach(function(item) {
            var type = String(item.homeType || "").trim();
            if (type === "ملك") stats.ملك++;
            else if (type === "إيجار") stats.إيجار++;
            else if (type === "عشوائيات") stats.عشوائيات++;
        });

        document.getElementById('count-total').innerText = stats.total;
        document.getElementById('count-ملك').innerText = stats.ملك;
        document.getElementById('count-إيجار').innerText = stats.إيجار;
        document.getElementById('count-عشوائيات').innerText = stats.عشوائيات;
    }

    function liveSearch() {
        var term = document.getElementById('searchInput').value.trim().toLowerCase();
        var resultsArea = document.getElementById('resultsArea');
        resultsArea.innerHTML = "";

        if (!term) return;

        var filtered = database.filter(function(f) {
            return (f.name && String(f.name).toLowerCase().includes(term)) ||
                (f.phone && String(f.phone).includes(term)) ||
                (f.familyMembers && String(f.familyMembers).toLowerCase().includes(term));
        });

        if (filtered.length === 0) {
            resultsArea.innerHTML = "<p style='color:#666; font-size:14px;'>لا توجد نتائج مطابقة</p>";
            return;
        }

        filtered.forEach(function(item) {
            var div = document.createElement('div');
            div.className = 'result-item';
            div.onclick = function() { showDetail(item); };
            div.innerHTML =
                "<strong>" + (item.name || "-") + "</strong>" +
                "<div class='details'>" +
                "📞 " + (item.phone || 'غير مسجل') + " &nbsp;|&nbsp; 🏠 " + (item.homeType || '-') + "<br>" +
                "📍 " + (item.address || 'غير محدد') +
                "</div>" +
                "<div class='member-tag'>" + (item.serialId || '-') + "</div>";
            resultsArea.appendChild(div);
        });
    }

    function esc(s) {
        if (s === undefined || s === null) return "";
        return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }
    function val(v) { return (v !== undefined && v !== null && String(v).trim() !== "") ? esc(String(v).trim()) : "—"; }

    function parseFamilyMembers(text) {
        if (!text || String(text).trim() === "") return [];
        var lines = String(text).split(/\n/);
        var rows = [];
        for (var i = 0; i < lines.length; i++) {
            var line = lines[i].trim();
            if (!line) continue;
            var parts = line.split(/\t/);
            if (parts.length >= 7) {
                rows.push({
                    num: parts[0],
                    name: parts[1] || "—",
                    birth: parts[2] || "—",
                    job: parts[3] || "—",
                    edu: parts[4] || "—",
                    social: parts[5] || "—",
                    relation: parts[6] || "—"
                });
            } else {
                var numMatch = line.match(/^(\d+)/);
                var num = numMatch ? numMatch[1] : (rows.length + 1);
                var rest = line.replace(/^\d+[\-\s\.]+/, "").trim();
                var relMatch = rest.match(/\s*\(([^)]+)\)\s*$/);
                var name, relation;
                if (relMatch) {
                    relation = relMatch[1].trim();
                    name = rest.replace(/\s*\([^)]+\)\s*$/, "").trim();
                } else {
                    name = rest;
                    relation = "—";
                }
                rows.push({ num: num, name: name || "—", birth: "—", job: "—", edu: "—", social: "—", relation: relation });
            }
        }
        return rows;
    }

    function cardRow(lbl, v) {
        var valStr = (v !== undefined && v !== null && String(v).trim() !== "") ? String(v).trim() : "—";
        return "<div class='card-row'><span class='lbl'>" + esc(lbl) + "</span><span class='val'>" + esc(valStr) + "</span></div>";
    }

    function showDetail(item) {
        var body = document.getElementById('detailBody');

        var html = "";
        html += "<div class='card-photo-top'><div class='card-photo-frame'>صورة رب الأسرة</div></div>";
        html += "<h1 class='card-main-title'>استمارة جرد عوائل وأفراد حي القائم الأول</h1>";
        html += "<p class='card-head-name'>اسم رب الأسرة الرباعي واللقب: " + val(item.name) + "</p>";

        html += "<div class='card-section'>";
        html += "<div class='card-section-title sec-head'>👤 بيانات رب الأسرة</div>";
        html += "<div class='card-section-body'><div class='card-two-cols'>";
        html += "<div class='card-col'>";
        html += cardRow("التولد", item.birth) + cardRow("العنوان", item.address) + cardRow("المهنة", item.job);
        html += cardRow("موقع العمل", item.workLocation) + cardRow("تاريخ السكن", item.moveDate) + cardRow("رقم المعاملة", item.serialId);
        html += "</div><div class='card-col'>";
        html += cardRow("رقم الدار", item.homeNum) + cardRow("رقم الهاتف", item.phone) + cardRow("التحصيل الدراسي", item.education);
        html += "</div></div></div></div>";

        html += "<div class='card-section'>";
        html += "<div class='card-section-title sec-home'>🏠 تفاصيل السكن</div>";
        html += "<div class='card-section-body'><div class='card-two-cols'>";
        html += "<div class='card-col'>";
        html += cardRow("نوع السكن الحالي", item.homeType) + cardRow("موقع السكن السابق", item.prevAddress);
        html += "</div><div class='card-col'>";
        html += cardRow("رقم البطاقة التموينية", item.cardId) + cardRow("رقم الطابو", item.taboo);
        html += "</div></div></div></div>";

        html += "<div class='card-section'>";
        html += "<div class='card-section-title sec-family'>👨‍👩‍👧‍👦 اسم الزوجة وأفراد الأسرة</div>";
        html += "<div class='card-section-body'>";
        var members = parseFamilyMembers(item.familyMembers);
        html += "<div class='form-table-wrap'><table class='form-table form-table-family'>";
        html += "<thead><tr><th class='col-num'>ت</th><th>الاسم</th><th>التولد</th><th>المهنة</th><th>التحصيل الدراسي</th><th>الحالة الاجتماعية</th><th>الصلة برب الأسرة</th></tr></thead><tbody>";
        if (members.length === 0) {
            html += "<tr><td class='col-num'>1</td><td>—</td><td>—</td><td>—</td><td>—</td><td>—</td><td>—</td></tr>";
        } else {
            for (var j = 0; j < members.length; j++) {
                var m = members[j];
                html += "<tr><td class='col-num'>" + esc(m.num) + "</td><td>" + esc(m.name) + "</td><td>" + esc(m.birth) + "</td><td>" + esc(m.job) + "</td><td>" + esc(m.edu) + "</td><td>" + esc(m.social) + "</td><td>" + esc(m.relation) + "</td></tr>";
            }
        }
        html += "</tbody></table></div></div></div>";

        html += "<div class='card-section'>";
        html += "<div class='card-section-title sec-notes'>📝 الملاحظات</div>";
        html += "<div class='card-section-body'><div class='form-notes'><div class='box'>&nbsp;</div></div></div></div>";

        body.innerHTML = html;
        document.getElementById('detailOverlay').style.display = "block";
        document.body.style.overflow = "hidden";
    }

    function closeDetail() {
        document.getElementById('detailOverlay').style.display = "none";
        document.body.style.overflow = "";
    }

    window.onload = init;
</script>

</body>
</html>
