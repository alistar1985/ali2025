<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة جرد حي القائم الأول - المختار أحمد هاني</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a2a6c; --accent: #b21f1f; --bg: #f4f7f9; --success: #2e7d32; --error: #d32f2f; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding: 10px; -webkit-user-select: none; user-select: none; }
        input, select, textarea { -webkit-user-select: text; user-select: text; }
        .app-container { max-width: 800px; margin: auto; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; border-top: 8px solid var(--primary); }
        .header { background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; padding: 25px; text-align: center; }
        .form-body { padding: 20px; }
        .section-head { background: #e3f2fd; color: var(--primary); padding: 10px 15px; border-radius: 10px; font-weight: bold; margin: 20px 0 10px; border-right: 5px solid var(--accent); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; font-family: 'Cairo'; }
        .member-card { background: #f9f9f9; border: 1px solid #eee; padding: 15px; border-radius: 15px; margin-bottom: 15px; border-right: 4px solid var(--success); }
        .btn-add { background: var(--success); color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
        .btn-submit { background: var(--primary); color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-submit:disabled { background: #ccc; cursor: not-allowed; }
        #reviewModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; overflow-y: auto; padding: 15px; }
        .modal-content { background: white; max-width: 650px; margin: 5px auto; border-radius: 15px; padding: 20px; }
        .preview-box { background: #f8f9fa; border-radius: 10px; padding: 10px; margin-bottom: 20px; border: 1px solid #ddd; max-height: 450px; overflow-y: auto; }
        .preview-group-title { background: #eee; padding: 8px; font-weight: bold; margin-top: 10px; border-radius: 5px; color: var(--primary); font-size: 14px; }
        .preview-item { border-bottom: 1px solid #e0e0e0; padding: 8px 5px; display: flex; justify-content: space-between; font-size: 13px; }
        .preview-val { font-weight: bold; color: #000; }
        #duplicateWarning { color: var(--error); font-weight: bold; display: none; margin-top: 5px; font-size: 13px; }
        #loadingStatus { font-size: 12px; color: var(--primary); margin-bottom: 10px; display: block; text-align: center; }
        #successScreen { display: none; text-align: center; padding: 50px 20px; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="reviewModal">
    <div class="modal-content">
        <h3 style="text-align:center; color: var(--accent); margin-top:0;">📋 مراجعة كافة البيانات قبل الحفظ</h3>
        <div id="previewData" class="preview-box"></div>
        <div style="display: flex; gap: 10px;">
            <button onclick="finalSend()" style="background: var(--success); color: white; flex: 2; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer;">تأكيد وحفظ البيانات ✅</button>
            <button onclick="closeModal()" style="background: #757575; color: white; flex: 1; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer;">تعديل ✏️</button>
        </div>
    </div>
</div>

<div class="app-container" id="mainWrapper">
    <div id="formSection">
        <div class="header">
            <h2 style="margin:0">منظومة جرد حي القائم الأول</h2>
            <p style="margin:5px 0 0; opacity:0.9; font-size:16px">المختار أحمد هاني</p>
        </div>

        <form class="form-body" id="censusForm">
            <span id="loadingStatus">⏳ جاري مزامنة قاعدة البيانات للفحص الفوري...</span>
            
            <div class="section-head">👤 بيانات رب الأسرة</div>
            <div class="grid">
                <div>
                    <input type="text" id="name" placeholder="الاسم الرباعي واللقب" required oninput="instantCheck(this.value)">
                    <div id="duplicateWarning">⚠️ هذا الاسم مسجل مسبقاً! لا يمكن الإرسال.</div>
                </div>
                <input type="text" id="nationalId" placeholder="رقم البطاقة الموحدة">
                <input type="text" id="cardId" placeholder="رقم البطاقة التموينية">
                <input type="number" id="birth" placeholder="سنة التولد">
                <select id="education">
                    <option value="">التحصيل الدراسي</option>
                    <option>أمي</option><option>ابتدائية</option><option>متوسطة</option><option>إعدادية</option><option>دبلوم</option><option>بكالوريوس</option><option>دراسات عليا</option>
                </select>
                <input type="text" id="job" placeholder="المهنة">
                <input type="text" id="workLocation" placeholder="موقع العمل الحالي">
                <input type="tel" id="phone" placeholder="رقم الهاتف" required>
            </div>

            <div class="section-head">🏠 تفاصيل السكن</div>
            <div class="grid">
                <select id="homeType"><option>ملك</option><option>إيجار</option><option>عشوائيات</option></select>
                <input type="text" id="prevAddress" placeholder="عنوان السكن السابق">
                <input type="text" id="address" placeholder="العنوان الحالي">
                <input type="text" id="moveDate" placeholder="تاريخ السكن">
                <input type="text" id="taboo" placeholder="رقم الطابو">
                <input type="text" id="homeNum" placeholder="رقم الدار">
            </div>

            <div class="section-head">👨‍👩‍👧‍👦 أفراد الأسرة</div>
            <div id="membersContainer"></div>
            <button type="button" class="btn-add" onclick="addMember()">+ إضافة فرد جديد للعائلة</button>

            <button type="button" id="previewBtn" class="btn-submit" onclick="showPreview()" style="margin-top:20px; background: var(--accent);">معاينة كافة البيانات</button>
        </form>
    </div>

    <div id="successScreen">
        <div style="font-size:70px; color: var(--success)">✔️</div>
        <h2 style="color: var(--success)">تم الحفظ بنجاح!</h2>
        <p id="serialDisplay" style="font-weight:bold; color:var(--primary); font-size:20px;"></p>
        <button class="btn-submit" onclick="location.reload()">إدخال استمارة جديدة</button>
    </div>
</div>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbx5PKH1HFUlJmInQvym5ri7TYtJFC_JJQmFN6jJvjrr9_-tfxF5gVYe1T8i1z1DE_R_JQ/exec"; 
    const SECRET_TOKEN = "AL_QAIM_MUKHTAR_2026";
    let cachedNames = [];

    // جلب قاعدة البيانات عند التشغيل للفحص الفوري
    async function loadDatabase() {
        try {
            const res = await fetch(`${scriptURL}?token=${SECRET_TOKEN}&getAllNames=true`);
            const data = await res.json();
            cachedNames = data.names.map(n => n.toString().trim());
            document.getElementById('loadingStatus').innerText = "✅ تم تحديث قاعدة البيانات (الفحص الفوري نشط)";
            document.getElementById('loadingStatus').style.color = "green";
        } catch (e) {
            document.getElementById('loadingStatus').innerText = "⚠️ فشل التحديث التلقائي (سيتم الفحص عند الكتابة)";
        }
    }

    // فحص فوري بدون تأخير
    function instantCheck(currentName) {
        const warning = document.getElementById('duplicateWarning');
        const btn = document.getElementById('previewBtn');
        const nameInput = document.getElementById('name');
        
        if (cachedNames.includes(currentName.trim())) {
            warning.style.display = 'block';
            btn.disabled = true;
            nameInput.style.border = "2px solid var(--error)";
        } else {
            warning.style.display = 'none';
            btn.disabled = false;
            nameInput.style.border = "1px solid #ccc";
        }
    }

    function addMember() {
        const container = document.getElementById("membersContainer");
        const div = document.createElement("div");
        div.className = "member-card";
        div.innerHTML = `
            <button type="button" onclick="this.parentElement.remove()" style="float:left; border:none; background:none; color:red; cursor:pointer; font-weight:bold;">✕ حذف</button>
            <div class="grid">
                <input type="text" class="m-name" placeholder="الاسم الثلاثي">
                <select class="m-rel"><option>زوجة</option><option>ابن</option><option>ابنة</option><option>أخرى</option></select>
                <input type="number" class="m-birth" placeholder="سنة التولد">
                <input type="text" class="m-job" placeholder="المهنة">
                <select class="m-edu"><option value="">الدراسة</option><option>ابتدائية</option><option>متوسطة</option><option>إعدادية</option><option>دبلوم</option><option>بكالوريوس</option></select>
                <select class="m-social"><option>أعزب/باكر</option><option>متزوج/ة</option><option>مطلق/ة</option><option>أرمل/ة</option></select>
            </div>`;
        container.appendChild(div);
    }

    function showPreview() {
        const name = document.getElementById('name').value;
        if (!name || !document.getElementById('phone').value) { alert("يرجى ملء الاسم ورقم الهاتف"); return; }
        
        let familyHtml = "";
        document.querySelectorAll(".member-card").forEach((card, index) => {
            const n = card.querySelector(".m-name").value;
            const r = card.querySelector(".m-rel").value;
            if(n) familyHtml += `<div class="preview-item"><span>${index+1}. ${n}</span> <b>(${r})</b></div>`;
        });

        document.getElementById('previewData').innerHTML = `
            <div class="preview-group-title">👤 بيانات رب الأسرة</div>
            <div class="preview-item"><span>الاسم:</span> <span class="preview-val">${name}</span></div>
            <div class="preview-item"><span>الموحدة:</span> <span class="preview-val">${document.getElementById('nationalId').value || '-'}</span></div>
            <div class="preview-item"><span>التموينية:</span> <span class="preview-val">${document.getElementById('cardId').value || '-'}</span></div>
            <div class="preview-item"><span>التولد:</span> <span class="preview-val">${document.getElementById('birth').value || '-'}</span></div>
            <div class="preview-item"><span>الدراسة:</span> <span class="preview-val">${document.getElementById('education').value || '-'}</span></div>
            <div class="preview-item"><span>المهنة:</span> <span class="preview-val">${document.getElementById('job').value || '-'}</span></div>
            <div class="preview-item"><span>الهاتف:</span> <span class="preview-val">${document.getElementById('phone').value}</span></div>
            
            <div class="preview-group-title">🏠 تفاصيل السكن</div>
            <div class="preview-item"><span>نوع السكن:</span> <span class="preview-val">${document.getElementById('homeType').value}</span></div>
            <div class="preview-item"><span>العنوان الحالي:</span> <span class="preview-val">${document.getElementById('address').value || '-'}</span></div>
            <div class="preview-item"><span>رقم الدار:</span> <span class="preview-val">${document.getElementById('homeNum').value || '-'}</span></div>

            <div class="preview-group-title">👨‍👩‍👧‍👦 أفراد العائلة</div>
            ${familyHtml || '<div class="preview-item">لا يوجد أفراد مضافين</div>'}
        `;
        document.getElementById('reviewModal').style.display = 'block';
    }

    function closeModal() { document.getElementById('reviewModal').style.display = 'none'; }

    function finalSend() {
        const sId = "QA-" + Math.floor(Math.random()*900000+100000);
        let family = "";
        document.querySelectorAll(".member-card").forEach((card, i) => {
            const n = card.querySelector(".m-name").value;
            if(n) family += `${i+1}- ${n} (${card.querySelector(".m-rel").value})\n`;
        });

        const formData = new URLSearchParams();
        formData.append("token", SECRET_TOKEN);
        formData.append("serialId", sId);
        formData.append("name", document.getElementById('name').value);
        formData.append("nationalId", document.getElementById('nationalId').value);
        formData.append("cardId", document.getElementById('cardId').value);
        formData.append("birth", document.getElementById('birth').value);
        formData.append("education", document.getElementById('education').value);
        formData.append("job", document.getElementById('job').value);
        formData.append("workLocation", document.getElementById('workLocation').value);
        formData.append("phone", document.getElementById('phone').value);
        formData.append("homeType", document.getElementById('homeType').value);
        formData.append("address", document.getElementById('address').value);
        formData.append("prevAddress", document.getElementById('prevAddress').value);
        formData.append("moveDate", document.getElementById('moveDate').value);
        formData.append("taboo", document.getElementById('taboo').value);
        formData.append("homeNum", document.getElementById('homeNum').value);
        formData.append("familyMembers", family);

        fetch(scriptURL, { method: 'POST', body: formData, mode: 'no-cors' });
        
        closeModal();
        document.getElementById('formSection').style.display = 'none';
        document.getElementById('successScreen').style.display = 'block';
        document.getElementById('serialDisplay').innerText = "رقم المعاملة: " + sId;
    }

    window.onload = () => { addMember(); loadDatabase(); };
</script>
</body>
</html>
